<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Premium | MODAPRO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm py-3">
        <div class="container flex-column gap-3">
            <div class="d-flex justify-content-between w-100 align-items-center">
                <a class="navbar-brand fw-800 fs-3" href="index.html">MODA<span class="text-primary">PRO</span></a>
                <div class="btn-group border rounded-pill overflow-hidden shadow-sm">
                    <button class="btn btn-dark btn-sm filter-gen" data-gen="Todos">Todos</button>
                    <button class="btn btn-white btn-sm filter-gen" data-gen="Hombre">Hombres</button>
                    <button class="btn btn-white btn-sm filter-gen" data-gen="Mujer">Mujeres</button>
                </div>
            </div>

            <div class="w-100">
                <div class="input-group">
                    <span class="input-group-text bg-white border-end-0 rounded-start-pill"><i class="fas fa-search text-muted"></i></span>
                    <input type="text" id="input-busqueda" class="form-control border-start-0 rounded-end-pill shadow-none" placeholder="Buscar por modelo, marca o código...">
                </div>
            </div>

            <div class="d-flex w-100 gap-2 flex-wrap">
                <select id="select-cat" class="form-select form-select-sm rounded-pill shadow-sm flex-grow-1">
                    <option value="Todas">Todas las Categorías</option>
                    <optgroup label="Ropa">
                        <option value="Polos">Polos</option>
                        <option value="Shorts">Shorts</option>
                        <option value="Vestidos">Vestidos</option>
                        <option value="Conjuntos">Conjuntos</option>
                        <option value="Pantalones">Pantalones</option>
                        <option value="Poleras">Poleras</option>
                    </optgroup>
                    <optgroup label="Accesorios">
                        <option value="Gorras">Gorras</option>
                        <option value="Taperes">Taperes</option>
                        <option value="Tomatodos">Tomatodos</option>
                        <option value="Cartucheras">Cartucheras</option>
                    </optgroup>
                </select>
                <select id="select-marca" class="form-select form-select-sm rounded-pill shadow-sm flex-grow-1">
                    <option value="Todas">Todas las Marcas</option>
                </select>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row g-4" id="contenedor-tienda">
            </div>
    </main>

    <div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content border-0 bg-transparent">
                <div class="modal-body p-0 text-center position-relative">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal" style="z-index: 2001;"></button>
                    
                    <button class="nav-modal prev" id="modalPrev"><i class="fas fa-chevron-left"></i></button>
                    <img src="" id="lightboxImage" class="img-fluid rounded shadow-lg" style="max-height: 90vh;">
                    <button class="nav-modal next" id="modalNext"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
