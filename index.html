<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Premium | WhatsApp Direct</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm py-3">
        <div class="container flex-column gap-3">
            <div class="d-flex justify-content-between w-100 align-items-center">
                <a class="navbar-brand fw-800 fs-3" href="index.html">MODA<span class="text-primary">PRO</span></a>
                <div class="btn-group border rounded-pill overflow-hidden shadow-sm">
                    <button class="btn btn-dark btn-sm filter-gen" data-gen="Todos">Todos</button>
                    <button class="btn btn-white btn-sm filter-gen" data-gen="Hombre">Hombres</button>
                    <button class="btn btn-white btn-sm filter-gen" data-gen="Mujer">Mujeres</button>
                </div>
            </div>
            <div class="d-flex w-100 gap-2 flex-wrap">
                <select id="select-cat" class="form-select form-select-sm rounded-pill shadow-sm flex-grow-1">
                    <option value="Todas">Todas las Categorías</option>
                    <option value="Ropa">Ropa</option>
                    <option value="Ropa">Taperes y Tomatodo</option>
                </select>
                <select id="select-marca" class="form-select form-select-sm rounded-pill shadow-sm flex-grow-1">
                    <option value="Todas">Todas las Marcas</option>
                </select>
            </div>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row g-4" id="contenedor-tienda"></div>
    </main>

    <div class="modal fade" id="lightboxModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-xl">
            <div class="modal-content border-0 bg-transparent">
                <div class="modal-body p-0 text-center">
                    <button type="button" class="btn-close btn-close-white position-absolute top-0 end-0 m-3" data-bs-dismiss="modal"></button>
                    <img src="" id="lightboxImage" class="img-fluid rounded shadow-lg" style="max-height: 90vh;">
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
